name: Frontend CI Pipeline

on:
  push:
    branches: [ main, develop, "feature/**" ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-and-lint:
    name: Test & Lint
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'
    
    - name: Install dependencies
      working-directory: frontend
      run: npm ci --legacy-peer-deps
      continue-on-error: true
    
    - name: Run ESLint
      working-directory: frontend
      run: npm run lint --if-present || echo "Linting not configured"
      continue-on-error: true
    
    - name: Run TypeScript check
      working-directory: frontend
      run: npx tsc --noEmit || true
      continue-on-error: true
    
    - name: Run unit tests
      working-directory: frontend
      run: npm test -- --passWithNoTests --coverage 2>/dev/null || npm test -- --passWithNoTests
      continue-on-error: true
    
    - name: Build project
      working-directory: frontend
      run: npm run build --if-present || echo "Build script not configured"
      continue-on-error: true

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'
    
    - name: Run npm audit
      working-directory: frontend
      run: npm audit --audit-level=moderate || echo "Security vulnerabilities found (non-blocking)"
      continue-on-error: true
    
    - name: Check for hardcoded secrets
      run: |
        echo "Scanning for hardcoded secrets..."
        if grep -r "password\|secret\|api[_-]key\|token" frontend/src --include="*.ts" --include="*.tsx" --include="*.js" -i | grep -v "\.test\|apiKey.*process\.env\|AUTH_TOKEN.*process\.env"; then
          echo "⚠️  Potential hardcoded secrets detected (review required)"
          exit 0
        else
          echo "✅ No obvious hardcoded secrets found"
        fi
      continue-on-error: true

  report:
    name: Summary Report
    runs-on: ubuntu-latest
    needs: [test-and-lint, security-audit]
    if: always()
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Generate summary
      run: |
        echo "## 🚀 Frontend CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Workflow Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Test & Lint" >> $GITHUB_STEP_SUMMARY
        echo "- Status: ${{ needs.test-and-lint.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- Matrix: Node 18.x, 20.x" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Security Audit" >> $GITHUB_STEP_SUMMARY
        echo "- Status: ${{ needs.security-audit.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- Checks: npm audit, hardcoded secrets scan" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Generated:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
